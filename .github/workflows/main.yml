name: 8x Daily API Trigger
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allows you to test manually

jobs:
  execute-api-call:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Run Script
        env:
          URL_A: ${{ secrets.URL_A }}
          # This line maps your Secret 'TOKEN' to a Python variable
          MY_API_TOKEN: ${{ secrets.TOKEN }} 
        run: python script.py
