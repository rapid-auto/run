name: 8x Daily Randomized Requester

on:
  schedule:
    # This triggers at minute 0 of every 3rd hour (UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch: # This adds a "Run workflow" button for manual testing

jobs:
  execute-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Randomized Script
        env:
          # This pulls your private URLs from GitHub Secrets
          URL_A: ${{ secrets.URL_A }}
          URL_B: ${{ secrets.URL_B }}
        run: python script.py
